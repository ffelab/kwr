			#canvas {

				justify-content: flex-start;
				gap: 2dvw;
				flex: 1 1;
			}

			#button-wrapper {
				height: 45%;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			#start-btn,
			#hold-btn {
				border: solid var(--primary-bg-color) 1.8px;
				font-size: min(1.6rem, calc(94dvw / 16));
				padding: 1dvw 3dvw;
				animation: glow 1s ease-in-out infinite;
				box-shadow: 0 0 0.2px 0px var(--primary-bg-color);
				font-size: min(1.6rem, calc(94dvw / 16));
				font-family: "JetBrainsMono", monospace;
				font-weight: 700;
				background: var(--secondary-highlight-color);
				color: var(--darker-highlight-color);
				border: 1.8px solid var(--darker-highlight-color);
				border-radius: 2px;
				cursor: pointer;
				touch-action: none;
			}
			#hold-btn {
				aspect-ratio: 1/1;
				width: 27dvw;
				display: none;
				border-radius: 50%;
				padding: 0;
				animation: none;
				background-color: var(--primary-text-color);
				color: var(--primary-bg-color);
				border: none;
				font-size: 10dvw;
				touch-action: none;
			}

			/* Locked state for the hold button */
			#hold-btn.held {
				background-color: var(--darker-highlight-color);
				color: var(--primary-bg-color);
			}

			#start-btn:active {
				background: var(--primary-highlight-color);
			}

				justify-content: space-between;
				gap: 12px;
				touch-action: none;

			var video, canvas, context, imageData, detector;
			var tickStarted = false;

			// --- Stable center-focus ID detection ---
			var confirmedId = null;
			var candidateId = null;
			var candidateSeen = 0;
			var lostFrames = 0;
			var CONFIRM_FRAMES = 6;
			var LOST_FRAMES = 18;

			// --- Hold/lock state ---
			var isHeld = false;
			var lockedId = null;
			var lockedMarker = null;

			function startCamera() {
				var display = document.getElementById("id-display");
				document.getElementById("start-btn").style.display = "none";
				document.getElementById("hold-btn").style.display = "block";

				var constraints = {
					video: {
						facingMode: { exact: "environment" },
						width: { ideal: 960 },
						height: { ideal: 540 },
					},
				};

				navigator.mediaDevices
					.getUserMedia(constraints)
					.catch(function () {
						return navigator.mediaDevices.getUserMedia({
							video: { facingMode: "environment" },
						});
					})
					.catch(function () {
						return navigator.mediaDevices.getUserMedia({
							video: true,
						});
					})
					.then(attachStream)
					.catch(function () {
						document.getElementById("id-value").textContent =
							"Camera error";
						document.getElementById("id-value").className = "empty";
					});
			}

			function attachStream(stream) {
				video.srcObject = stream;

				video.addEventListener("loadedmetadata", function () {
					canvas.width = video.videoWidth;
					canvas.height = video.videoHeight;
				});

				video.addEventListener("playing", function () {
					if (!tickStarted) {
						tickStarted = true;
						requestAnimationFrame(tick);
					}
				});

				video.play().catch(function () {});
			}

			function tick() {
				requestAnimationFrame(tick);
				if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

				// Always draw the live camera frame
				context.drawImage(video, 0, 0, canvas.width, canvas.height);
				imageData = context.getImageData(
					0,
					0,
					canvas.width,
					canvas.height,
				);

				if (isHeld) {
					// While held: redraw the locked marker overlay only, don't update state
					if (lockedMarker !== null) {
						drawMarker(lockedMarker);
					}
					drawCenterCrosshair();
					// Display stays frozen — updateDisplay() not called
					return;
				}

				// Normal scanning
				var markers = detector.detect(imageData);
				var best = pickCenterMarker(markers);

				if (best !== null) {
					lostFrames = 0;
					drawMarker(best);

					if (best.id === candidateId) {
						candidateSeen++;
					} else {
						candidateId = best.id;
						candidateSeen = 1;
					}

					if (candidateSeen >= CONFIRM_FRAMES) {
						confirmedId = candidateId;
					}
				} else {
					lostFrames++;
					if (lostFrames >= LOST_FRAMES) {
						confirmedId = null;
						candidateId = null;
						candidateSeen = 0;
					}
				}

				drawCenterCrosshair();
				updateDisplay();
			}

			function pickCenterMarker(markers) {
				if (!markers || markers.length === 0) return null;

				var cx = canvas.width / 2;
				var cy = canvas.height / 2;
				var best = null;
				var bestDist = Infinity;

				for (var i = 0; i < markers.length; i++) {
					var corners = markers[i].corners;
					var mx = 0,
						my = 0;
					for (var j = 0; j < corners.length; j++) {
						mx += corners[j].x;
						my += corners[j].y;
					}
					mx /= corners.length;
					my /= corners.length;

					var dist = Math.sqrt(
						(mx - cx) * (mx - cx) + (my - cy) * (my - cy),
					);
					if (dist < bestDist) {
						bestDist = dist;
						best = markers[i];
					}
				}
				return best;
			}

			function drawCenterCrosshair() {
				var cx = canvas.width / 2;
				var cy = canvas.height / 2;
				var arm = Math.max(16, canvas.width / 48);
				var lw = Math.max(1.5, canvas.width / 480);
				var r = arm * 0.7;

				context.save();
				context.globalCompositeOperation = "difference";
				context.strokeStyle = "#ffffff";
				context.lineWidth = lw;
				context.lineCap = "butt";

				context.beginPath();
				context.moveTo(cx - arm, cy);
				context.lineTo(cx + arm, cy);
				context.moveTo(cx, cy - arm);
				context.lineTo(cx, cy + arm);
				context.stroke();

				context.beginPath();
				context.arc(cx, cy, r, 0, Math.PI * 2);
				context.stroke();

				context.restore();
			}

			function drawMarker(marker) {
				var corners = marker.corners;

				context.strokeStyle = "#676cfd";
				context.lineWidth = Math.max(3, canvas.width / 100);
				context.beginPath();
				for (var j = 0; j < corners.length; j++) {
					var c = corners[j];
					var next = corners[(j + 1) % corners.length];
					context.moveTo(c.x, c.y);
					context.lineTo(next.x, next.y);
				}
				context.stroke();
				context.closePath();

				context.fillStyle = "#676cfd";
				context.fillRect(corners[0].x - 3, corners[0].y - 3, 6, 6);

				var fontSize = Math.max(24, canvas.width / 10);
				context.font = "bold " + fontSize + "px 'JetBrainsMono'";
				context.fillStyle = "#252cff";
				var clueNum = marker.id + 1;

				var xMax = -Infinity,
					ySum = 0;
				for (var k = 0; k < corners.length; k++) {
					xMax = Math.max(xMax, corners[k].x);
					ySum += corners[k].y;
				}
				var yCenter = ySum / corners.length;

				context.fillText(clueNum, xMax + 8, yCenter + fontSize * 0.35);
			}

			function updateDisplay() {
				var el = document.getElementById("id-value");
				if (confirmedId !== null) {
					el.textContent = clues[confirmedId + 1];
					el.className = "locked";
				} else if (candidateId !== null) {
					el.textContent = clues[candidateId + 1];
					el.className = "";
				} else {
					el.textContent = "Point at a marker";
					el.className = "empty";
				}
			}

			function holdStart() {
				if (confirmedId === null && candidateId === null) return;
				isHeld = true;
				lockedId = confirmedId !== null ? confirmedId : candidateId;

				var btn = document.getElementById("hold-btn");
				btn.classList.add("held");

				var display = document.getElementById("id-display");
				display.classList.add("held");

				var clue = document.getElementById("id-value");
				clue.classList.add("held");

				var el = document.getElementById("id-value");
				if (lockedId !== null) {
					el.textContent = clues[lockedId + 1];
					el.className = "locked";
				}

				var lockedNum = document.getElementById("lockedNum");
				let num = lockedId + 1;
				lockedNum.textContent = lockedId + 1;
				lockedNum.style.opacity = "1";
			}

			function holdEnd() {
				isHeld = false;
				lockedId = null;
				lockedMarker = null;

				var btn = document.getElementById("hold-btn");
				btn.classList.remove("held");

				var display = document.getElementById("id-display");
				display.classList.remove("held");

				var clue = document.getElementById("id-value");
				clue.classList.remove("held");

				var lockedNum = document.getElementById("lockedNum");
				lockedNum.textContent = "";
				lockedNum.style.opacity = "0";

				// Resume live display immediately
				updateDisplay();
			}

			window.onload = function () {
				video = document.getElementById("video");
				canvas = document.getElementById("canvas");
				context = canvas.getContext("2d");
				canvas.width = 1280;
				canvas.height = 720;
				detector = new AR.Detector();

				var btn = document.getElementById("hold-btn");

				// Touch events for mobile
				btn.addEventListener(
					"touchstart",
					function (e) {
						e.preventDefault();
						holdStart();
					},
					{ passive: false },
				);

				btn.addEventListener(
					"touchend",
					function (e) {
						e.preventDefault();
						holdEnd();
					},
					{ passive: false },
				);

				btn.addEventListener(
					"touchcancel",
					function (e) {
						e.preventDefault();
						holdEnd();
					},
					{ passive: false },
				);

				// Mouse events for desktop fallback
				btn.addEventListener("mousedown", function (e) {
					e.preventDefault();
					holdStart();
				});

				btn.addEventListener("mouseup", function (e) {
					e.preventDefault();
					holdEnd();
				});

				btn.addEventListener("mouseleave", function (e) {
					if (isHeld) holdEnd();
				});

				// Prevent any context menu on long-press anywhere
				document.addEventListener("contextmenu", function (e) {
					e.preventDefault();
				});

				// Prevent selection on the whole document
				document.addEventListener("selectstart", function (e) {
					e.preventDefault();
				});
			};
		</script>
	</head>
	<body>
		<div class="howto"></div>

		<div id="canvas-wrap">
			<div id="lockedNum">200</div>
			<video
				id="video"
				autoplay
				playsinline
				muted
				style="display: none"
			></video>
			<canvas id="canvas"></canvas>
		</div>
		<div id="interface">
			<div id="id-display">
				<span id="id-value" class="empty">Point at a marker</span>
			</div>
			<div id="button-wrapper">
				<button id="start-btn" onclick="startCamera()">
					Scan starten
				</button>
				<button id="hold-btn"></button>
			</div>
		</div>
	</body>
</html>
