<html>
	<head>
		<title>Augmented Reality Marker Detector</title>

		<script src="../js/libs/polyfill.js"></script>
		<script src="../js/cv.js"></script>
		<script src="../js/aruco.js"></script>

		<script>
			var video, canvas, context, imageData, detector;

			function onLoad() {
				video = document.getElementById("video");
				canvas = document.getElementById("canvas");
				context = canvas.getContext("2d");

				detector = new AR.Detector();

				// Fix camera (back camera + good resolution)
				navigator.mediaDevices
					.getUserMedia({
						video: {
							facingMode: "environment",
							width: { ideal: 1280 },
							height: { ideal: 720 },
						},
					})
					.catch(() => {
						return navigator.mediaDevices.getUserMedia({
							video: true,
						});
					})
					.then(function (stream) {
						video.srcObject = stream;
					});

				// IMPORTANT: set correct canvas resolution from camera
				video.addEventListener("loadedmetadata", function () {
					canvas.width = video.videoWidth;
					canvas.height = video.videoHeight;
				});

				requestAnimationFrame(tick);
			}

			function tick() {
				requestAnimationFrame(tick);

				if (video.readyState === video.HAVE_ENOUGH_DATA) {
					// draw current frame for detection
					context.drawImage(video, 0, 0, canvas.width, canvas.height);

					imageData = context.getImageData(
						0,
						0,
						canvas.width,
						canvas.height,
					);

					const markers = detector.detect(imageData);

					updateMarkerDisplay(markers);

					drawMarkers(markers);
				}
			}

			function updateMarkerDisplay(markers) {
				const display = document.getElementById("markerDisplay");

				if (!markers.length) {
					display.innerText = "No marker detected";
					return;
				}

				const ids = markers.map((m) => m.id);
				display.innerText = "Detected marker IDs: " + ids.join(", ");
			}

			function drawMarkers(markers) {
				context.lineWidth = 3;
				context.font = "20px monospace";

				for (let i = 0; i < markers.length; i++) {
					const corners = markers[i].corners;

					// draw outline
					context.strokeStyle = "red";
					context.beginPath();

					for (let j = 0; j < corners.length; j++) {
						const c1 = corners[j];
						const c2 = corners[(j + 1) % corners.length];

						context.moveTo(c1.x, c1.y);
						context.lineTo(c2.x, c2.y);
					}

					context.stroke();

					// draw ID position
					let x = Infinity;
					let y = Infinity;

					for (let j = 0; j < corners.length; j++) {
						x = Math.min(x, corners[j].x);
						y = Math.min(y, corners[j].y);
					}

					context.fillStyle = "blue";
					context.fillText(markers[i].id, x, y);
				}
			}

			window.onload = onLoad;
		</script>
	</head>

	<body style="font-family: monospace; text-align: center">
		<div style="margin: 10px">
			<strong>-= Augmented Reality Marker Detector =-</strong>
		</div>

		<div
			style="
				position: relative;
				width: 640px;
				height: 480px;
				margin: auto;
			"
		>
			<video
				id="video"
				autoplay
				playsinline
				style="position: absolute; width: 100%; height: 100%"
			></video>

			<canvas
				id="canvas"
				style="position: absolute; width: 100%; height: 100%"
			></canvas>
		</div>

		<div
			id="markerDisplay"
			style="
				margin-top: 10px;
				font-size: 20px;
				font-weight: bold;
				color: green;
			"
		>
			No marker detected
		</div>
	</body>
</html>
