<html>
	<head>
		<title>Augmented Reality Marker Detector</title>

		<script type="text/javascript" src="../js/libs/polyfill.js"></script>

		<script type="text/javascript" src="../js/cv.js"></script>
		<script type="text/javascript" src="../js/aruco.js"></script>

		<script>
			var video, canvas, context, imageData, detector;

			function onLoad() {
				video = document.getElementById("video");
				canvas = document.getElementById("canvas");
				context = canvas.getContext("2d");

				canvas.width = parseInt(canvas.style.width);
				canvas.height = parseInt(canvas.style.height);

				if (navigator.mediaDevices === undefined) {
					navigator.mediaDevices = {};
				}

				if (navigator.mediaDevices.getUserMedia === undefined) {
					navigator.mediaDevices.getUserMedia = function (
						constraints,
					) {
						var getUserMedia =
							navigator.webkitGetUserMedia ||
							navigator.mozGetUserMedia;

						if (!getUserMedia) {
							return Promise.reject(
								new Error(
									"getUserMedia is not implemented in this browser",
								),
							);
						}

						return new Promise(function (resolve, reject) {
							getUserMedia.call(
								navigator,
								constraints,
								resolve,
								reject,
							);
						});
					};
				}

				navigator.mediaDevices
					.getUserMedia({
						video: {
							facingMode: "environment",
							width: { ideal: 640 },
							height: { ideal: 480 },
						},
					})
					.then((stream) => {
						video.srcObject = stream;
					})
					.catch((err) => console.error(err));

				detector = new AR.Detector();

				requestAnimationFrame(tick);
			}

			video.addEventListener("loadedmetadata", () => {
				canvas.width = video.videoWidth;
				canvas.height = video.videoHeight;
			});

			function tick() {
				requestAnimationFrame(tick);

				if (video.readyState === video.HAVE_ENOUGH_DATA) {
					// Grab current frame (not visible to user)
					context.drawImage(video, 0, 0, canvas.width, canvas.height);
					imageData = context.getImageData(
						0,
						0,
						canvas.width,
						canvas.height,
					);

					// Clear overlay BEFORE drawing markers
					context.clearRect(0, 0, canvas.width, canvas.height);

					const markers = detector.detect(imageData);

					drawCorners(markers);
					drawId(markers);
				}
			}

			function snapshot() {
				context.drawImage(video, 0, 0, canvas.width, canvas.height);
				imageData = context.getImageData(
					0,
					0,
					canvas.width,
					canvas.height,
				);
			}

			function drawCorners(markers) {
				var corners, corner, i, j;

				context.lineWidth = 3;

				for (i = 0; i !== markers.length; ++i) {
					corners = markers[i].corners;

					context.strokeStyle = "red";
					context.beginPath();

					for (j = 0; j !== corners.length; ++j) {
						corner = corners[j];
						context.moveTo(corner.x, corner.y);
						corner = corners[(j + 1) % corners.length];
						context.lineTo(corner.x, corner.y);
					}

					context.stroke();
					context.closePath();

					context.strokeStyle = "green";
					context.strokeRect(
						corners[0].x - 2,
						corners[0].y - 2,
						4,
						4,
					);
				}
			}

			function drawId(markers) {
				var corners, corner, x, y, i, j;

				context.strokeStyle = "blue";
				context.lineWidth = 1;

				for (i = 0; i !== markers.length; ++i) {
					corners = markers[i].corners;

					x = Infinity;
					y = Infinity;

					for (j = 0; j !== corners.length; ++j) {
						corner = corners[j];

						x = Math.min(x, corner.x);
						y = Math.min(y, corner.y);
					}

					context.strokeText(markers[i].id, x, y);
				}
			}

			window.onload = onLoad;
		</script>
	</head>

	<body style="font-family: monospace">
		<center>
			<div style="margin: 10px">
				<strong>-= Augmented Reality Marker Detector =-</strong>
			</div>
			<div style="position: relative; width: 640px; height: 480px">
				<video
					id="video"
					autoplay
					playsinline
					style="
						position: absolute;
						top: 0;
						left: 0;
						width: 100%;
						height: 100%;
					"
				></video>

				<canvas id="canvas" style="position: absolute; top: 0; left: 0">
				</canvas>
			</div>
			<div style="margin: 15px">
				<strong
					>Powered by
					<a href="http://code.google.com/p/js-aruco/"
						>js-aruco</a
					></strong
				>
			</div>
		</center>
	</body>
</html>
