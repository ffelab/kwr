<!doctype html>
<html>
	<head>
		<title>Augmented Reality Marker Detector</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script type="text/javascript" src="libs/polyfill.js"></script>
		<script type="text/javascript" src="cv.js"></script>
		<script type="text/javascript" src="aruco.js"></script>
		<style>
			body {
				font-family: monospace;
				background: #111;
				color: #eee;
				margin: 0;
				padding: 10px;
				display: flex;
				flex-direction: column;
				align-items: center;
			}
			h2 {
				font-size: 1em;
				margin: 10px 0;
				color: #aef;
			}
			#canvas {
				width: 100%;
				max-width: 720px;
				height: auto;
				display: block;
				border: 2px solid #444;
			}
			#marker-display {
				margin-top: 12px;
				width: 100%;
				max-width: 720px;
				background: #222;
				border: 1px solid #555;
				border-radius: 6px;
				padding: 10px 14px;
				box-sizing: border-box;
			}
			#marker-display h3 {
				margin: 0 0 6px 0;
				font-size: 0.85em;
				color: #888;
				text-transform: uppercase;
				letter-spacing: 1px;
			}
			#marker-ids {
				font-size: 1.4em;
				color: #4f4;
				min-height: 1.6em;
				word-break: break-all;
			}
			#marker-ids.empty {
				color: #555;
				font-size: 0.95em;
			}
			a {
				color: #7af;
			}
		</style>
		<script>
			var video, canvas, context, imageData, detector;

			function onLoad() {
				video = document.getElementById("video");
				canvas = document.getElementById("canvas");
				context = canvas.getContext("2d");

				// Native resolution — will be updated once the camera stream is known
				canvas.width = 1280;
				canvas.height = 720;

				navigator.mediaDevices
					.getUserMedia({
						video: {
							facingMode: { exact: "environment" }, // back camera
							width: { ideal: 1280 },
							height: { ideal: 720 },
						},
					})
					.then(function (stream) {
						video.srcObject = stream;

						// Once metadata is available, match canvas to actual stream resolution
						video.addEventListener("loadedmetadata", function () {
							canvas.width = video.videoWidth;
							canvas.height = video.videoHeight;
						});
					})
					.catch(function (err) {
						console.warn(
							"Back camera unavailable, falling back: " +
								err.message,
						);
						// Fallback: any available camera
						return navigator.mediaDevices
							.getUserMedia({ video: true })
							.then(function (stream) {
								video.srcObject = stream;
								video.addEventListener(
									"loadedmetadata",
									function () {
										canvas.width = video.videoWidth;
										canvas.height = video.videoHeight;
									},
								);
							});
					});

				detector = new AR.Detector();
				requestAnimationFrame(tick);
			}

			function tick() {
				requestAnimationFrame(tick);

				if (video.readyState === video.HAVE_ENOUGH_DATA) {
					snapshot();
					var markers = detector.detect(imageData);
					drawCorners(markers);
					drawId(markers);
					updateMarkerDisplay(markers);
				}
			}

			function snapshot() {
				context.drawImage(video, 0, 0, canvas.width, canvas.height);
				imageData = context.getImageData(
					0,
					0,
					canvas.width,
					canvas.height,
				);
			}

			function drawCorners(markers) {
				var corners, corner, i, j;
				context.lineWidth = 3;

				for (i = 0; i !== markers.length; ++i) {
					corners = markers[i].corners;

					context.strokeStyle = "red";
					context.beginPath();
					for (j = 0; j !== corners.length; ++j) {
						corner = corners[j];
						context.moveTo(corner.x, corner.y);
						corner = corners[(j + 1) % corners.length];
						context.lineTo(corner.x, corner.y);
					}
					context.stroke();
					context.closePath();

					context.strokeStyle = "green";
					context.strokeRect(
						corners[0].x - 2,
						corners[0].y - 2,
						4,
						4,
					);
				}
			}

			function drawId(markers) {
				var corners, corner, x, y, i, j;
				context.strokeStyle = "blue";
				context.lineWidth = 1;
				context.font = "bold 20px monospace";

				for (i = 0; i !== markers.length; ++i) {
					corners = markers[i].corners;
					x = Infinity;
					y = Infinity;

					for (j = 0; j !== corners.length; ++j) {
						corner = corners[j];
						x = Math.min(x, corner.x);
						y = Math.min(y, corner.y);
					}
					context.strokeText(markers[i].id, x, y);
				}
			}

			function updateMarkerDisplay(markers) {
				var el = document.getElementById("marker-ids");
				if (markers.length === 0) {
					el.textContent = "No markers detected";
					el.className = "empty";
				} else {
					var ids = markers
						.map(function (m) {
							return "#" + m.id;
						})
						.join("   ");
					el.textContent = ids;
					el.className = "";
				}
			}

			window.onload = onLoad;
		</script>
	</head>
	<body>
		<h2>-= Augmented Reality Marker Detector =-</h2>
		<video
			id="video"
			autoplay
			playsinline
			muted
			style="display: none"
		></video>
		<canvas id="canvas"></canvas>

		<div id="marker-display">
			<h3>Detected Marker IDs</h3>
			<div id="marker-ids" class="empty">No markers detected</div>
		</div>

		<div style="margin: 15px; font-size: 0.8em">
			Powered by <a href="http://code.google.com/p/js-aruco/">js-aruco</a>
		</div>
	</body>
</html>
