<!doctype html>
<html>
	<head>
		<title>Augmented Reality Marker Detector</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script type="text/javascript" src="../js/libs/polyfill.js"></script>
		<script type="text/javascript" src="../js/cv.js"></script>
		<script type="text/javascript" src="../js/aruco.js"></script>
		<style>
			body {
				font-family: monospace;
				background: #111;
				color: #eee;
				margin: 0;
				padding: 10px;
				display: flex;
				flex-direction: column;
				align-items: center;
			}
			h2 {
				font-size: 1em;
				margin: 10px 0;
				color: #aef;
			}
			#canvas {
				width: 100%;
				max-width: 720px;
				height: auto;
				display: block;
				border: 2px solid #444;
			}
			#marker-display {
				margin-top: 12px;
				width: 100%;
				max-width: 720px;
				background: #222;
				border: 1px solid #555;
				border-radius: 6px;
				padding: 10px 14px;
				box-sizing: border-box;
			}
			#marker-display h3 {
				margin: 0 0 6px 0;
				font-size: 0.85em;
				color: #888;
				text-transform: uppercase;
				letter-spacing: 1px;
			}
			#marker-ids {
				font-size: 1.4em;
				color: #4f4;
				min-height: 1.6em;
				word-break: break-all;
			}
			#marker-ids.empty {
				color: #555;
				font-size: 0.95em;
			}
			#debug {
				margin-top: 10px;
				width: 100%;
				max-width: 720px;
				background: #000;
				border: 1px solid #f80;
				border-radius: 6px;
				padding: 8px 12px;
				box-sizing: border-box;
				font-size: 0.75em;
				color: #f80;
				max-height: 200px;
				overflow-y: auto;
			}
			#debug h3 {
				margin: 0 0 4px 0;
				color: #fa0;
				font-size: 0.9em;
			}
			a {
				color: #7af;
			}
			#start-btn {
				margin-top: 10px;
				padding: 12px 30px;
				font-size: 1em;
				background: #2a6;
				color: white;
				border: none;
				border-radius: 6px;
				cursor: pointer;
			}
		</style>
		<script>
			var video, canvas, context, imageData, detector;
			var tickStarted = false;

			function log(msg) {
				var el = document.getElementById("debug-log");
				var line = document.createElement("div");
				line.textContent =
					"[" + new Date().toLocaleTimeString() + "] " + msg;
				el.appendChild(line);
				el.scrollTop = el.scrollHeight;
			}

			function startCamera() {
				document.getElementById("start-btn").style.display = "none";
				log("Requesting back camera...");

				navigator.mediaDevices
					.getUserMedia({
						video: {
							facingMode: { exact: "environment" },
							width: { ideal: 1280 },
							height: { ideal: 720 },
						},
					})
					.then(function (stream) {
						log("Got stream: " + stream.getVideoTracks()[0].label);
						attachStream(stream);
					})
					.catch(function (err) {
						log(
							"Back camera failed: " +
								err.name +
								" - " +
								err.message,
						);
						log("Trying any camera...");
						return navigator.mediaDevices
							.getUserMedia({ video: true })
							.then(function (stream) {
								log(
									"Fallback stream: " +
										stream.getVideoTracks()[0].label,
								);
								attachStream(stream);
							})
							.catch(function (err2) {
								log(
									"ERROR: " +
										err2.name +
										" - " +
										err2.message,
								);
							});
					});
			}

			function attachStream(stream) {
				video.srcObject = stream;
				log("Stream attached to video element");

				video.addEventListener("loadedmetadata", function () {
					log(
						"Metadata loaded: " +
							video.videoWidth +
							"x" +
							video.videoHeight,
					);
					canvas.width = video.videoWidth;
					canvas.height = video.videoHeight;
				});

				video.addEventListener("canplay", function () {
					log("Video canplay event fired");
				});

				video.addEventListener("playing", function () {
					log("Video is NOW PLAYING - starting AR tick");
					if (!tickStarted) {
						tickStarted = true;
						requestAnimationFrame(tick);
					}
				});

				video
					.play()
					.then(function () {
						log("video.play() resolved");
					})
					.catch(function (e) {
						log(
							"video.play() failed: " +
								e.name +
								" - " +
								e.message,
						);
					});
			}

			function tick() {
				requestAnimationFrame(tick);
				if (video.readyState === video.HAVE_ENOUGH_DATA) {
					snapshot();
					var markers = detector.detect(imageData);
					drawCorners(markers);
					drawId(markers);
					updateMarkerDisplay(markers);
				}
			}

			function snapshot() {
				context.drawImage(video, 0, 0, canvas.width, canvas.height);
				imageData = context.getImageData(
					0,
					0,
					canvas.width,
					canvas.height,
				);
			}

			function drawCorners(markers) {
				var corners, corner, i, j;
				context.lineWidth = 3;
				for (i = 0; i !== markers.length; ++i) {
					corners = markers[i].corners;
					context.strokeStyle = "red";
					context.beginPath();
					for (j = 0; j !== corners.length; ++j) {
						corner = corners[j];
						context.moveTo(corner.x, corner.y);
						corner = corners[(j + 1) % corners.length];
						context.lineTo(corner.x, corner.y);
					}
					context.stroke();
					context.closePath();
					context.strokeStyle = "green";
					context.strokeRect(
						corners[0].x - 2,
						corners[0].y - 2,
						4,
						4,
					);
				}
			}

			function drawId(markers) {
				var corners, corner, x, y, i, j;
				context.strokeStyle = "blue";
				context.lineWidth = 1;
				context.font = "bold 20px monospace";
				for (i = 0; i !== markers.length; ++i) {
					corners = markers[i].corners;
					x = Infinity;
					y = Infinity;
					for (j = 0; j !== corners.length; ++j) {
						corner = corners[j];
						x = Math.min(x, corner.x);
						y = Math.min(y, corner.y);
					}
					context.strokeText(markers[i].id, x, y);
				}
			}

			function updateMarkerDisplay(markers) {
				var el = document.getElementById("marker-ids");
				if (markers.length === 0) {
					el.textContent = "No markers detected";
					el.className = "empty";
				} else {
					el.textContent = markers
						.map(function (m) {
							return "#" + m.id;
						})
						.join("   ");
					el.className = "";
				}
			}

			window.onload = function () {
				video = document.getElementById("video");
				canvas = document.getElementById("canvas");
				context = canvas.getContext("2d");
				canvas.width = 1280;
				canvas.height = 720;
				detector = new AR.Detector();
				log("Page loaded. Tap 'Start Camera' to begin.");
			};
		</script>
	</head>
	<body>
		<h2>-= Augmented Reality Marker Detector =-</h2>
		<video
			id="video"
			autoplay
			playsinline
			muted
			style="display: none"
		></video>
		<canvas id="canvas"></canvas>
		<button id="start-btn" onclick="startCamera()">▶ Start Camera</button>

		<div id="marker-display">
			<h3>Detected Marker IDs</h3>
			<div id="marker-ids" class="empty">No markers detected</div>
		</div>

		<div id="debug">
			<h3>Debug Log</h3>
			<div id="debug-log"></div>
		</div>

		<div style="margin: 15px; font-size: 0.8em">
			Powered by <a href="http://code.google.com/p/js-aruco/">js-aruco</a>
		</div>
	</body>
</html>
