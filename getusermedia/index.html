<!doctype html>
<html>
	<head>
		<title>AR Marker Detector</title>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>

		<script type="text/javascript" src="../js/libs/polyfill.js"></script>
		<script type="text/javascript" src="../js/cv.js"></script>
		<script type="text/javascript" src="../js/aruco.js"></script>
		<style>
			@font-face {
				font-family: "JetBrainsMono";
				src: url(./fonts/JetBrainsMono-VariableFont_wght.ttf);
			}

			:root {
				--body-bg: linear-gradient(rgb(255, 255, 255), rgb(36, 36, 36));
				--primary-bg-color: #ededed;
				--secondary-bg-color: rgb(201, 205, 240);
				--lighter-bg-color: rgb(220, 220, 220);
				--between-dark-light: rgb(183, 183, 183);

				--primary-highlight-color: #676cfd;
				--darker-highlight-color: #252cff;
				--primary-warning-color: #ff2529;
				--secondary-highlight-color: #c6cdff;

				--primary-text-color: rgb(23, 23, 23);
				--darker-text-color: rgb(10, 20, 45);
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: "JetBrainsMono", monospace;
				background: var(--primary-bg-color);
				color: var(--primary-text-color);
				height: 100dvh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: space-between;
				padding: 2dvw;
				gap: 2dvw;
				overflow: hidden;
			}

			#canvas-wrap {
				flex: 1 1 auto;
				min-height: 0;
				width: 100%;
				display: flex;
				justify-content: center;
				align-items: center;
			}

			#canvas {
				display: block;
				max-width: 100%;
				max-height: 100%;
				width: auto;
				height: auto;
				border-radius: 2px;
				border: 1.8px solid var(--primary-text-color);
			}

			#start-btn {
				padding: 10px 28px;
				width: 100%;
				font-size: min(1.6rem, calc(94dvw / 16));
				font-family: "JetBrainsMono", monospace;
				background: #1a3a2a;
				color: var(--darker-highlight-color);
				border: 1.8px solid var(--darker-highlight-color);
				border-radius: 2px;
				cursor: pointer;
				letter-spacing: 0.1em;
			}
			#start-btn:active {
				background: var(--secondary-highlight-color);
			}

			#id-display {
				flex-shrink: 0;
				width: 96dvw;
				max-width: 480px;
				background: var(--primary-bg-color);
				border: 1.8px solid var(--primary-text-color);
				border-radius: 2px;
				padding: 10px 16px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 12px;
			}

			#id-label {
				font-size: clamp(0.6em, 2vw, 0.75em);
				color: var(--primary-text-color);
				text-transform: uppercase;
				letter-spacing: 0.12em;
				white-space: nowrap;
			}

			#id-value {
				font-size: clamp(1.6em, 7vw, 2.4em);
				font-weight: bold;
				color: var(--primary-text-color);
				letter-spacing: 0.05em;
				transition: color 0.2s;
				text-align: right;
			}
			#id-value.empty {
				color: var(--between-dark-light);
				font-size: clamp(0.8em, 3vw, 1em);
				font-weight: normal;
			}
			#id-value.locked {
				color: var(--darker-highlight-color);
			}
		</style>
		<script>
			var video, canvas, context, imageData, detector;
			var tickStarted = false;

			// --- Stable center-focus ID detection ---
			var confirmedId = null; // the currently displayed ID
			var candidateId = null; // ID we're seeing consistently
			var candidateSeen = 0; // how many frames in a row we've seen it
			var lostFrames = 0; // how many frames since we last saw anything

			var CONFIRM_FRAMES = 6; // frames needed to switch to a new ID
			var LOST_FRAMES = 18; // frames of nothing before clearing display

			function startCamera() {
				document.getElementById("start-btn").style.display = "none";

				var constraints = {
					video: {
						facingMode: { exact: "environment" },
						width: { ideal: 1920 },
						height: { ideal: 1080 },
					},
				};

				navigator.mediaDevices
					.getUserMedia(constraints)
					.catch(function () {
						return navigator.mediaDevices.getUserMedia({
							video: { facingMode: "environment" },
						});
					})
					.catch(function () {
						return navigator.mediaDevices.getUserMedia({
							video: true,
						});
					})
					.then(attachStream)
					.catch(function (err) {
						document.getElementById("id-value").textContent =
							"Camera error";
						document.getElementById("id-value").className = "empty";
					});
			}

			function attachStream(stream) {
				video.srcObject = stream;

				video.addEventListener("loadedmetadata", function () {
					canvas.width = video.videoWidth;
					canvas.height = video.videoHeight;
				});

				video.addEventListener("playing", function () {
					if (!tickStarted) {
						tickStarted = true;
						requestAnimationFrame(tick);
					}
				});

				video.play().catch(function () {});
			}

			function tick() {
				requestAnimationFrame(tick);
				if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

				context.drawImage(video, 0, 0, canvas.width, canvas.height);
				imageData = context.getImageData(
					0,
					0,
					canvas.width,
					canvas.height,
				);

				var markers = detector.detect(imageData);
				var best = pickCenterMarker(markers);

				if (best !== null) {
					lostFrames = 0;
					drawMarker(best);

					if (best.id === candidateId) {
						candidateSeen++;
					} else {
						candidateId = best.id;
						candidateSeen = 1;
					}

					// Only switch confirmed ID after seeing consistently
					if (candidateSeen >= CONFIRM_FRAMES) {
						confirmedId = candidateId;
					}
				} else {
					lostFrames++;
					if (lostFrames >= LOST_FRAMES) {
						confirmedId = null;
						candidateId = null;
						candidateSeen = 0;
					}
				}

				updateDisplay();
			}

			// Returns the single marker closest to the canvas center
			function pickCenterMarker(markers) {
				if (!markers || markers.length === 0) return null;

				var cx = canvas.width / 2;
				var cy = canvas.height / 2;
				var best = null;
				var bestDist = Infinity;

				for (var i = 0; i < markers.length; i++) {
					var corners = markers[i].corners;
					var mx = 0,
						my = 0;
					for (var j = 0; j < corners.length; j++) {
						mx += corners[j].x;
						my += corners[j].y;
					}
					mx /= corners.length;
					my /= corners.length;

					var dist = Math.sqrt(
						(mx - cx) * (mx - cx) + (my - cy) * (my - cy),
					);
					if (dist < bestDist) {
						bestDist = dist;
						best = markers[i];
					}
				}
				return best;
			}

			function drawMarker(marker) {
				var corners = marker.corners;

				// Outline
				context.strokeStyle = "#4f4";
				context.lineWidth = Math.max(2, canvas.width / 320);
				context.beginPath();
				for (var j = 0; j < corners.length; j++) {
					var c = corners[j];
					var next = corners[(j + 1) % corners.length];
					context.moveTo(c.x, c.y);
					context.lineTo(next.x, next.y);
				}
				context.stroke();
				context.closePath();

				// Corner dot
				context.fillStyle = "#fa0";
				context.fillRect(corners[0].x - 3, corners[0].y - 3, 6, 6);

				// ID label on canvas
				var x = Infinity,
					y = Infinity;
				for (var k = 0; k < corners.length; k++) {
					x = Math.min(x, corners[k].x);
					y = Math.min(y, corners[k].y);
				}
				var fontSize = Math.max(16, canvas.width / 40);
				context.font = "bold " + fontSize + "px 'Courier New'";
				context.fillStyle = "#fa0";
				context.fillText("#" + marker.id, x, Math.max(y - 6, fontSize));
			}

			function updateDisplay() {
				var el = document.getElementById("id-value");
				if (confirmedId !== null) {
					el.textContent = "#" + confirmedId;
					el.className = "locked";
				} else if (candidateId !== null) {
					// Show candidate dimly while building confidence
					el.textContent = "#" + candidateId + "…";
					el.className = "";
				} else {
					el.textContent = "Point at a marker";
					el.className = "empty";
				}
			}

			window.onload = function () {
				video = document.getElementById("video");
				canvas = document.getElementById("canvas");
				context = canvas.getContext("2d");
				canvas.width = 1280;
				canvas.height = 720;
				detector = new AR.Detector();
			};
		</script>
	</head>
	<body>
		<div id="canvas-wrap">
			<video
				id="video"
				autoplay
				playsinline
				muted
				style="display: none"
			></video>
			<canvas id="canvas"></canvas>
		</div>

		<button id="start-btn" onclick="startCamera()">▶ Start Camera</button>

		<div id="id-display">
			<span id="id-label">Detected ID</span>
			<span id="id-value" class="empty">Point at a marker</span>
		</div>
	</body>
</html>
