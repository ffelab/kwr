<!doctype html>
<html>
	<head>
		<title>AR Marker Detector</title>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>

		<script type="text/javascript" src="../js/libs/polyfill.js"></script>
		<script type="text/javascript" src="../js/cv.js"></script>
		<script type="text/javascript" src="../js/aruco.js"></script>
		<link href="../css/styleScan.css" rel="stylesheet" />
	</head>
	<body>
		<div id="info" class="hidden">
			<details name="story">
				<summary>HILFE</summary>
				<p></p>
			</details>
			<details name="story">
				<summary>LÖSUNGSWORT</summary>
				<p></p>
			</details>
			<button class="close-button">SCHLIESSEN</button>
		</div>
		<div id="canvas-wrap">
			<div class="menu-btn-container"><button id="menu">?</button></div>

			<video
				id="video"
				autoplay
				playsinline
				muted
				style="display: none"
			></video>
			<canvas id="canvas"></canvas>
		</div>
		<div id="interface">
			<div id="id-display">
				<span id="id-value" class="empty">Point at a marker</span>
			</div>
			<div id="button-wrapper">
				<button id="start-btn" onclick="startCamera()">
					Scan starten
				</button>
				<button id="hold-btn"></button>
			</div>
		</div>

		<script src="../js/scan.js" type="text/javascript"></script>
	</body>
</html>
