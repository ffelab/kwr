				--darker-text-color: rgb(10, 20, 45);

			*,
			*::before,

				margin: 0;
				padding: 0;

				flex-direction: column;
				align-items: center;
				justify-content: space-between;
				padding: 2dvw;
				gap: 2dvw;
				overflow: hidden;
			}

			#canvas-wrap {

				border-radius: 2px;
				flex: 1 1 auto;
				min-height: 0;
				width: 100%;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
				transition:
					height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
					flex-basis 0.35s cubic-bezier(0.4, 0, 0.2, 1);
			}

			#canvas {
				display: block;
				width: 100%;
				height: 100%;
				object-fit: cover;
				flex-shrink: 0;
			}

			#start-btn {
				min-height: 10dvw;
				padding: 10px 20px;
				width: 100%;
				font-size: min(1.6rem, calc(94dvw / 16));
				font-family: "JetBrainsMono", monospace;
				font-weight: 700;
				background: var(--secondary-highlight-color);
				color: var(--darker-highlight-color);
				border: 1.8px solid var(--darker-highlight-color);
				border-radius: 2px;
				cursor: pointer;
			}
			#start-btn:active {
				background: var(--primary-highlight-color);
			}

			#id-display {
				flex-shrink: 0;
				width: 96dvw;
				min-height: 10dvw;
				max-width: 480px;
				background: var(--primary-bg-color);
				font-size: 2.4dvh;
				border: 1.8px solid var(--primary-text-color);
				border-radius: 2px;
				padding: 10px 20px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 12px;
			}

			#id-value {
				width: 100%;
				line-height: 3.5dvh;
				font-size: 2.4dvh;
				font-weight: 700;
				text-align: center;
				color: var(--primary-text-color);
				transition: color 0.2s;
				white-space: pre-wrap;
			}
			#id-value.empty {
				color: var(--between-dark-light);
				font-size: clamp(0.8em, 3vw, 1em);
				font-weight: normal;
			}
			#id-value.locked {
				color: var(--darker-highlight-color);
			}

			var video, canvas, context, imageData, detector;
			var tickStarted = false;

			// --- Stable center-focus ID detection ---
			var confirmedId = null;
			var candidateId = null;
			var candidateSeen = 0;
			var lostFrames = 0;

			var CONFIRM_FRAMES = 6;
			var LOST_FRAMES = 18;

			function startCamera() {
				document.getElementById("start-btn").style.display = "none";

				var constraints = {
					video: {
						facingMode: { exact: "environment" },
						width: { ideal: 960 },
						height: { ideal: 540 },
					},
				};

				navigator.mediaDevices
					.getUserMedia(constraints)
					.catch(function () {
						return navigator.mediaDevices.getUserMedia({
							video: { facingMode: "environment" },
						});
					})
					.catch(function () {
						return navigator.mediaDevices.getUserMedia({
							video: true,
						});
					})
					.then(attachStream)
					.catch(function (err) {
						document.getElementById("id-value").textContent =
							"Camera error";
						document.getElementById("id-value").className = "empty";
					});
			}

			function attachStream(stream) {
				video.srcObject = stream;

				video.addEventListener("loadedmetadata", function () {
					canvas.width = video.videoWidth;
					canvas.height = video.videoHeight;
				});

				video.addEventListener("playing", function () {
					if (!tickStarted) {
						tickStarted = true;
						requestAnimationFrame(tick);
					}
				});

				video.play().catch(function () {});
			}

			function tick() {
				requestAnimationFrame(tick);
				if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

				context.drawImage(video, 0, 0, canvas.width, canvas.height);
				imageData = context.getImageData(
					0,
					0,
					canvas.width,
					canvas.height,
				);

				var markers = detector.detect(imageData);
				var best = pickCenterMarker(markers);

				if (best !== null) {
					lostFrames = 0;
					drawMarker(best);

					if (best.id === candidateId) {
						candidateSeen++;
					} else {
						candidateId = best.id;
						candidateSeen = 1;
					}

					// Only switch confirmed ID after seeing consistently
					if (candidateSeen >= CONFIRM_FRAMES) {
						confirmedId = candidateId;
					}
				} else {
					lostFrames++;
					if (lostFrames >= LOST_FRAMES) {
						confirmedId = null;
						candidateId = null;
						candidateSeen = 0;
					}
				}

				drawCenterCrosshair();
				updateDisplay();
			}

			function pickCenterMarker(markers) {
				if (!markers || markers.length === 0) return null;

				var cx = canvas.width / 2;
				var cy = canvas.height / 2 - canvas.height * 0.08;
				var best = null;
				var bestDist = Infinity;

				for (var i = 0; i < markers.length; i++) {
					var corners = markers[i].corners;
					var mx = 0,
						my = 0;
					for (var j = 0; j < corners.length; j++) {
						mx += corners[j].x;
						my += corners[j].y;
					}
					mx /= corners.length;
					my /= corners.length;

					var dist = Math.sqrt(
						(mx - cx) * (mx - cx) + (my - cy) * (my - cy),
					);
					if (dist < bestDist) {
						bestDist = dist;
						best = markers[i];
					}
				}
				return best;
			}

			function drawCenterCrosshair() {
				var cx = canvas.width / 2;
				var cy = canvas.height / 2 - canvas.height * 0.08;
				var arm = Math.max(16, canvas.width / 48);
				var lw = Math.max(1.5, canvas.width / 480);
				var r = arm * 0.8;

				context.save();
				context.globalCompositeOperation = "difference";
				context.strokeStyle = "#ffffff";
				context.lineWidth = lw;
				context.lineCap = "butt";

				// Full crossing lines (no gap)
				context.beginPath();
				context.moveTo(cx - arm, cy);
				context.lineTo(cx + arm, cy);
				context.moveTo(cx, cy - arm);
				context.lineTo(cx, cy + arm);
				context.stroke();

				// Circle around centre
				context.beginPath();
				context.arc(cx, cy, r, 0, Math.PI * 2);
				context.stroke();

				context.restore();
			}

			function drawMarker(marker) {
				var corners = marker.corners;

				// Border
				context.strokeStyle = "#676cfd";
				context.lineWidth = Math.max(3, canvas.width / 100);
				context.beginPath();
				for (var j = 0; j < corners.length; j++) {
					var c = corners[j];
					var next = corners[(j + 1) % corners.length];
					context.moveTo(c.x, c.y);
					context.lineTo(next.x, next.y);
				}
				context.stroke();
				context.closePath();

				// Corner dot
				context.fillStyle = "#676cfd";
				context.fillRect(corners[0].x - 3, corners[0].y - 3, 6, 6);

				// ID label on canvas
				var fontSize = Math.max(24, canvas.width / 10);
				context.font = "bold " + fontSize + "px 'JetBrainsMono'";
				context.fillStyle = "#252cff";
				var clueNum = marker.id + 1;

				var xMax = -Infinity,
					ySum = 0;
				for (var k = 0; k < corners.length; k++) {
					xMax = Math.max(xMax, corners[k].x);
					ySum += corners[k].y;
				}
				var yCenter = ySum / corners.length;

				context.fillText(clueNum, xMax + 8, yCenter + fontSize * 0.35);
			}

			function updateDisplay() {
				var el = document.getElementById("id-value");
				if (confirmedId !== null) {
					el.textContent = clues[confirmedId + 1];
					el.className = "locked";
				} else if (candidateId !== null) {
					el.textContent = clues[candidateId + 1];
					el.className = "";
				} else {
					el.textContent = "Point at a marker";
					el.className = "empty";
				}
			}

			window.onload = function () {
				video = document.getElementById("video");
				canvas = document.getElementById("canvas");
				context = canvas.getContext("2d");
				canvas.width = 1280;
				canvas.height = 720;
				detector = new AR.Detector();
			};
